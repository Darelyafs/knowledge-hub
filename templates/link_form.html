{% extends "base.html" %}
{% block title %}{% if link %}编辑{% else %}添加{% endif %}网址{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{% if link %}✏️ 编辑网址{% else %}➕ 添加新网址{% endif %}</h1>
    <a href="{{ url_for('link_list') }}" class="btn">← 返回列表</a>
</div>

<form method="post" action="{{ url_for('link_save') }}" class="card" style="max-width:720px;">
    {% if link %}<input type="hidden" name="id" value="{{ link.id }}">{% endif %}

    <div class="form-group">
        <label for="title">网址名称 <span style="color:var(--danger);">*</span></label>
        <input type="text" name="title" id="title" class="form-control" required
               value="{{ link.title if link else '' }}" placeholder="如：React 19 新特性详解">
    </div>

    <div class="form-group">
        <label for="url">链接 (URL) <span style="color:var(--danger);">*</span></label>
        <input type="url" name="url" id="url" class="form-control" required
               value="{{ link.url if link else '' }}" placeholder="https://...">
    </div>

    <div class="form-group">
        <label for="category">分类</label>
        <select name="category" id="category" class="form-control">
            {% for cat in categories %}
            <option value="{{ cat }}" {% if link and link.category == cat %}selected{% elif not link and cat == '其他' %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="author">上传人</label>
        <input type="text" name="author" id="author" class="form-control"
               value="{{ link.thoughts if link else '' }}" placeholder="你的名字">
    </div>

    <div class="form-group">
        <label for="summary">📝 简介</label>
        <textarea name="summary" id="summary" class="form-control" rows="4"
                  placeholder="简要描述...">{{ link.summary if link else '' }}</textarea>
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">💾 保存</button>
        <a href="{{ url_for('link_list') }}" class="btn">取消</a>
    </div>
</form>

{% endblock %}

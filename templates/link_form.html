{% extends "base.html" %}
{% block title %}{% if link %}编辑{% else %}添加{% endif %}链接{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{% if link %}✏️ 编辑链接{% else %}➕ 添加新链接{% endif %}</h1>
    <a href="{{ url_for('link_list') }}" class="btn">← 返回列表</a>
</div>

<form method="post" action="{{ url_for('link_save') }}" class="card" style="max-width:720px;">
    {% if link %}<input type="hidden" name="id" value="{{ link.id }}">{% endif %}

    <div class="form-group">
        <label for="title">文章标题 <span style="color:var(--danger);">*</span></label>
        <input type="text" name="title" id="title" class="form-control" required
               value="{{ link.title if link else '' }}" placeholder="如：React 19 新特性详解">
    </div>

    <div class="form-group">
        <label for="url">链接地址 (URL) <span style="color:var(--danger);">*</span></label>
        <input type="url" name="url" id="url" class="form-control" required
               value="{{ link.url if link else '' }}" placeholder="https://...">
    </div>

    <div class="form-group">
        <label for="category">分类</label>
        <select name="category" id="category" class="form-control">
            {% for cat in categories %}
            <option value="{{ cat }}" {% if link and link.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="tags">标签 <span class="hint">多个用逗号分隔</span></label>
        <input type="text" name="tags" id="tags" class="form-control"
               value="{{ (link.tags | parse_tags) | join(', ') if link else '' }}"
               placeholder="如：react, frontend, javascript"
               list="tags-datalist">
        <datalist id="tags-datalist">
            {% for t in all_tags %}<option value="{{ t }}">{% endfor %}
        </datalist>
    </div>

    <div class="form-group">
        <label for="status">阅读状态</label>
        <select name="status" id="status" class="form-control">
            <option value="未读" {% if link and link.status == '未读' %}selected{% endif %}>未读</option>
            <option value="在读" {% if link and link.status == '在读' %}selected{% endif %}>在读</option>
            <option value="已读" {% if link and link.status == '已读' %}selected{% endif %}>已读</option>
        </select>
    </div>

    <div class="form-group">
        <label for="summary">📝 文章简介</label>
        <textarea name="summary" id="summary" class="form-control" rows="4"
                  placeholder="简要描述这篇文章讲了什么...">{{ link.summary if link else '' }}</textarea>
    </div>

    <div class="form-group">
        <label for="thoughts">💭 个人感受 / 笔记</label>
        <textarea name="thoughts" id="thoughts" class="form-control" rows="6"
                  placeholder="你的读后感、收获、评判...">{{ link.thoughts if link else '' }}</textarea>
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">💾 保存</button>
        <a href="{{ url_for('link_list') }}" class="btn">取消</a>
    </div>
</form>

{% endblock %}

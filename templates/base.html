<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}知识共享库{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-inner">
            <a href="{{ url_for('index') }}" class="nav-brand">📚 知识共享库</a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link">首页</a>
                <a href="{{ url_for('link_list') }}" class="nav-link">🔗 网址</a>
                <a href="{{ url_for('read_list') }}" class="nav-link">📄 PDF</a>
            </div>
            <span class="nav-search">
                <span class="search-icon">🔍</span>
                <form action="{{ url_for('search') }}" method="get" style="display:inline">
                    <input type="search" name="q" placeholder="搜索..." value="{{ q if q else '' }}" class="search-input">
                </form>
            </span>
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="container">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}" onclick="this.remove()">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <main class="container main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>📚 知识共享库</p>
        </div>
    </footer>

    <script>
    function confirmDelete(form) {
        if (confirm('确定要删除吗？此操作不可撤销。')) {
            form.submit();
        }
    }
    setTimeout(() => {
        document.querySelectorAll('.flash').forEach(el => {
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.3s';
            setTimeout(() => el.remove(), 300);
        });
    }, 4000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

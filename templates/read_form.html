{% extends "base.html" %}
{% block title %}{% if read %}编辑{% else %}添加{% endif %} PDF{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{% if read %}✏️ 编辑 PDF{% else %}➕ 添加新 PDF{% endif %}</h1>
    <a href="{{ url_for('read_list') }}" class="btn">← 返回列表</a>
</div>

<form method="post" action="{{ url_for('read_save') }}" class="card" style="max-width:720px;" enctype="multipart/form-data">
    {% if read %}<input type="hidden" name="id" value="{{ read.id }}">{% endif %}

    <div class="form-group">
        <label for="title">标题 <span style="color:var(--danger);">*</span></label>
        <input type="text" name="title" id="title" class="form-control" required
               value="{{ read.title if read else '' }}" placeholder="如：《代码整洁之道》读后感">
    </div>

    <div class="form-group">
        <label for="category">分类</label>
        <select name="category" id="category" class="form-control">
            {% for cat in categories %}
            <option value="{{ cat }}" {% if read and read.category == cat %}selected{% elif not read and cat == '其他' %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="author">上传人</label>
        <input type="text" name="author" id="author" class="form-control"
               value="{{ read.author if read else '' }}" placeholder="你的名字">
    </div>

    <div class="form-group">
        <label for="pdf_file">📎 上传 PDF <span class="hint">最大 10MB</span></label>
        {% if read and read.pdf_key %}
        <p style="font-size:0.85rem;margin-bottom:6px;">
            当前文件：
            <a href="{{ read.pdf_key | pdf_url }}" target="_blank">{{ read.pdf_key }}</a>
        </p>
        {% endif %}
        <input type="file" name="pdf_file" id="pdf_file" class="form-control" accept=".pdf">
        <input type="hidden" name="existing_pdf_key" value="{{ read.pdf_key if read else '' }}">
    </div>

    <div class="form-group">
        <label for="summary">📖 简介</label>
        <textarea name="summary" id="summary" class="form-control" rows="4"
                  placeholder="简要描述...">{{ read.summary if read else '' }}</textarea>
    </div>

    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">💾 保存</button>
        <a href="{{ url_for('read_list') }}" class="btn">取消</a>
    </div>
</form>

{% endblock %}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课题组资源共享库</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--p:#4f46e5;--pl:#eef2ff;--s:#059669;--sb:#ecfdf5;--d:#dc2626;--db:#fef2f2;--bg:#f8fafc;--cb:#fff;--b:#e2e8f0;--t:#1e293b;--tm:#94a3b8;--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--p);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:0 20px;width:100%}
.navbar{background:var(--cb);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.nav-inner{display:flex;align-items:center;gap:8px;height:56px}
.nav-brand{font-size:1.15rem;font-weight:700;color:var(--t);white-space:nowrap;cursor:pointer}
.nav-brand:hover{color:var(--p);text-decoration:none}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{padding:6px 12px;border-radius:6px;font-size:.9rem;color:var(--tm);cursor:pointer;border:none;background:none;font-family:inherit;transition:.15s}
.nav-link:hover,.nav-link.active{background:var(--pl);color:var(--p);text-decoration:none}
.nav-search{display:flex;align-items:center;gap:4px;flex-shrink:0}
.search-icon{font-size:.85rem}
.search-input{padding:6px 14px;border:1px solid var(--b);border-radius:20px;font-size:.85rem;width:160px;outline:none;transition:.15s;background:var(--bg)}
.search-input:focus{border-color:var(--p);width:200px}
.nav-toggle{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:4px;padding:4px}
.nav-toggle span{display:block;width:20px;height:2px;background:var(--t);border-radius:2px}
@media(max-width:700px){.nav-links{display:none;position:absolute;top:56px;left:0;right:0;background:var(--cb);flex-direction:column;padding:12px;border-bottom:1px solid var(--b)}.nav-links.open{display:flex}.nav-toggle{display:flex}.nav-search{margin-left:auto}.search-input{width:120px}.search-input:focus{width:150px}}
.main-content{flex:1;padding-top:24px;padding-bottom:40px;min-height:80vh}
.footer{text-align:center;padding:24px 20px;border-top:1px solid var(--b);color:var(--tm);font-size:.9rem;margin-top:auto}
.flash{padding:10px 18px;border-radius:var(--r);font-size:.9rem;cursor:pointer;margin-bottom:12px;animation:sd .3s}
.flash-success{background:var(--sb);color:var(--s);border:1px solid #a7f3d0}
.flash-error{background:var(--db);color:var(--d);border:1px solid #fecaca}
@keyframes sd{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.card{background:var(--cb);border:1px solid var(--b);border-radius:var(--r);padding:20px 150px 20px 24px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;transition:.15s}
.card:hover{box-shadow:0 4px 6px rgba(0,0,0,.05)}
@media(max-width:600px){.card{padding-right:24px}}
.card-title{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.card-title a{color:var(--t)}.card-title a:hover{color:var(--p)}
.card-meta{font-size:.8rem;color:var(--tm);margin-bottom:8px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.card-body{font-size:.9rem;line-height:1.6}
.card-actions{position:absolute;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px}
@media(max-width:600px){.card-actions{position:static;transform:none;flex-direction:row;margin-top:10px}}
.page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.page-header h1{font-size:1.5rem}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;border:1px solid var(--b);border-radius:6px;font-size:.85rem;cursor:pointer;transition:.15s;background:var(--cb);color:var(--t);font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg);text-decoration:none}
.btn-primary{background:var(--p);color:#fff;border-color:var(--p)}
.btn-primary:hover{opacity:.9;background:var(--p)}
.btn-danger{color:var(--d);border-color:#fecaca}.btn-danger:hover{background:var(--db)}
.btn-sm{padding:6px 14px;font-size:.85rem}
.tag{display:inline-block;padding:2px 10px;background:var(--pl);color:var(--p);border-radius:20px;font-size:.78rem;font-weight:500}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--b)}
.filter-label{font-size:.85rem;color:var(--tm);padding:6px 0}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-weight:600;font-size:.9rem;margin-bottom:5px}
.form-group .hint{font-size:.75rem;color:var(--tm);font-weight:400;margin-left:6px}
.form-control{width:100%;padding:9px 14px;border:1px solid var(--b);border-radius:6px;font-size:.9rem;font-family:inherit;transition:.15s;background:var(--cb)}
.form-control:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
textarea.form-control{resize:vertical;min-height:80px}
select.form-control{cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--cb);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px;text-align:center}
.stat-num{font-size:2rem;font-weight:700;color:var(--p)}
.stat-label{font-size:.85rem;color:var(--tm);margin-top:2px}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
@media(max-width:700px){.home-grid{grid-template-columns:1fr}}
.home-section h2{font-size:1.15rem;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--pl)}
.module-card{display:block;background:var(--cb);border:2px solid var(--b);border-radius:var(--r);padding:28px 24px;text-align:center;transition:all .2s;text-decoration:none;color:var(--t);cursor:pointer}
.module-card:hover{border-color:var(--p);box-shadow:0 4px 16px rgba(79,70,229,.1);transform:translateY(-2px);text-decoration:none}
.module-icon{font-size:2.8rem;margin-bottom:8px}
.module-num{font-size:2.4rem;font-weight:700;color:var(--p);line-height:1}
.module-title{font-size:1.2rem;font-weight:700;margin:8px 0 4px;color:var(--t)}
.empty-state{text-align:center;padding:48px 20px;color:var(--tm)}
.empty-state .icon{font-size:3rem;margin-bottom:12px}
.pdf-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#fef3c7;color:#92400e;border-radius:4px;font-size:.8rem}
.pdf-link:hover{background:#fde68a;text-decoration:none}
.hidden{display:none!important}
.spinner{text-align:center;padding:40px;color:var(--tm)}
/* feedback modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--cb);border-radius:var(--r);padding:28px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-box h3{margin-bottom:16px;font-size:1.1rem}
.modal-box textarea{min-height:160px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.feedback-badge{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:.82rem;color:#92400e;background:#fffbeb;padding:6px 10px;border-radius:6px;border-left:3px solid #f59e0b;cursor:pointer}
.feedback-badge:hover{background:#fef3c7}
</style>
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <span class="nav-brand" onclick="showPage('home')">📚 课题组资源共享库</span>
    <div class="nav-links" id="navLinks">
      <button class="nav-link active" data-page="home" onclick="showPage('home')">首页</button>
      <button class="nav-link" data-page="links" onclick="showPage('links')">🔗 网址</button>
      <button class="nav-link" data-page="reads" onclick="showPage('reads')">📄 PDF</button>
    </div>
    <span class="nav-search"><span class="search-icon">🔍</span><input type="search" class="search-input" id="searchBox" placeholder="搜索..." onkeydown="if(event.key==='Enter')search()"></span>
    <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div id="flashContainer" class="container"></div>
<main class="container main-content" id="mainContent"></main>
<footer class="footer"><p>📚 课题组资源共享库</p></footer>

<script>
// ── Init ───────────────────────────────────────────
const SUPABASE_URL = 'https://sujhbmkrmonjrcbcpxqb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1amhibWtybW9uanJjYmNweHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTg2MTUsImV4cCI6MjA5ODk5NDYxNX0.ieQVLlbZCh8O1SBLrwHnZ-cwA0LgjHuL9eFHcZ63YWA';
const BUCKET = 'pdfs';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const CATS = ['科研学习','工具便利','其他'];

let currentPage = 'home';

function flash(msg, type='success') {
  const el = document.getElementById('flashContainer');
  el.innerHTML = `<div class="flash flash-${type}" onclick="this.remove()">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-link').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  document.getElementById('navLinks').classList.remove('open');
  render();
}
function search() { showPage('search'); }

async function render() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="spinner">加载中...</div>';
  try {
    switch(currentPage) {
      case 'home': mc.innerHTML = await renderHome(); break;
      case 'links': mc.innerHTML = await renderLinks(); break;
      case 'reads': mc.innerHTML = await renderReads(); break;
      case 'search': mc.innerHTML = await renderSearch(); break;
      case 'linkForm': mc.innerHTML = await renderLinkForm(); break;
      case 'readForm': mc.innerHTML = await renderReadForm(); break;
      default: mc.innerHTML = await renderHome();
    }
  } catch(e) {
    mc.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败: ${e.message}</p></div>`;
  }
}

// ── Home ───────────────────────────────────────────
async function renderHome() {
  const {count:lc} = await sb.from('links').select('*',{count:'exact',head:true});
  const {count:rc} = await sb.from('reads').select('*',{count:'exact',head:true});
  const {data:links} = await sb.from('links').select('*').order('updated_at',{ascending:false}).limit(3);
  const {data:reads} = await sb.from('reads').select('*').order('updated_at',{ascending:false}).limit(3);

  let h = `
    <div style="text-align:center;padding:20px 0 32px">
      <h1 style="font-size:2rem;margin-bottom:8px">📚 课题组资源共享库</h1>
      <p style="color:var(--tm);font-size:1rem">网址 · PDF 资料</p>
    </div>
    <div class="home-grid">
      <div class="module-card" onclick="showPage('links')">
        <div class="module-icon">🔗</div>
        <div class="module-num">${lc||0}</div>
        <div class="module-title">网址</div>
        <span class="btn btn-primary" style="margin-top:12px">+ 添加网址</span>
      </div>
      <div class="module-card" onclick="showPage('reads')">
        <div class="module-icon">📄</div>
        <div class="module-num">${rc||0}</div>
        <div class="module-title">PDF</div>
        <span class="btn btn-primary" style="margin-top:12px">+ 添加 PDF</span>
      </div>
    </div>
    <div class="home-grid" style="margin-top:32px">
      <div class="home-section"><h2>🔗 最近网址</h2>`;
  if(links&&links.length) {
    links.forEach(l => h += cardLink(l));
    h += `<a href="#" onclick="showPage('links')" style="font-size:.9rem">浏览全部 →</a>`;
  } else {
    h += `<div class="empty-state"><div class="icon">🔗</div><p>还没有网址</p></div>`;
  }
  h += `</div><div class="home-section"><h2>📄 最近 PDF</h2>`;
  if(reads&&reads.length) {
    reads.forEach(r => h += cardRead(r));
    h += `<a href="#" onclick="showPage('reads')" style="font-size:.9rem">浏览全部 →</a>`;
  } else {
    h += `<div class="empty-state"><div class="icon">📄</div><p>还没有 PDF</p></div>`;
  }
  h += `</div></div>`;
  return h;
}

// ── Links list ─────────────────────────────────────
async function renderLinks() {
  const urlP = new URLSearchParams(window.location.search);
  const cat = urlP.get('category')||'';
  let q = sb.from('links').select('*').order('updated_at',{ascending:false});
  if(cat) q = q.eq('category',cat);
  const {data} = await q;

  let h = `<div class="page-header"><h1>🔗 网址</h1><button class="btn btn-primary" onclick="editLink()">+ 添加网址</button></div>
    <div class="filters"><span class="filter-label">分类：</span>
    <button class="btn btn-sm ${cat?'':'btn-primary'}" onclick="filterLinks('')">全部</button>`;
  CATS.forEach(c => h += `<button class="btn btn-sm ${cat===c?'btn-primary':''}" onclick="filterLinks('${c}')">${c}</button>`);
  h += `</div>`;

  if(data&&data.length) {
    data.forEach(l => h += cardLink(l));
  } else {
    h += `<div class="empty-state"><div class="icon">🔗</div><p>暂无网址</p></div>`;
  }
  return h;
}
function filterLinks(cat) {
  let p = cat ? `?category=${encodeURIComponent(cat)}` : '?';
  history.pushState({},'',p);
  render();
}

// ── Reads list ─────────────────────────────────────
async function renderReads() {
  const urlP = new URLSearchParams(window.location.search);
  const cat = urlP.get('category')||'';
  let q = sb.from('reads').select('*').order('updated_at',{ascending:false});
  if(cat) q = q.eq('category',cat);
  const {data} = await q;

  let h = `<div class="page-header"><h1>📄 PDF</h1><button class="btn btn-primary" onclick="editRead()">+ 添加 PDF</button></div>
    <div class="filters"><span class="filter-label">分类：</span>
    <button class="btn btn-sm ${cat?'':'btn-primary'}" onclick="filterReads('')">全部</button>`;
  CATS.forEach(c => h += `<button class="btn btn-sm ${cat===c?'btn-primary':''}" onclick="filterReads('${c}')">${c}</button>`);
  h += `</div>`;

  if(data&&data.length) {
    data.forEach(r => h += cardRead(r));
  } else {
    h += `<div class="empty-state"><div class="icon">📄</div><p>暂无 PDF</p></div>`;
  }
  return h;
}
function filterReads(cat) {
  let p = cat ? `?category=${encodeURIComponent(cat)}` : '?';
  history.pushState({},'',p);
  render();
}

// ── Search ─────────────────────────────────────────
async function renderSearch() {
  const qs = document.getElementById('searchBox').value.trim();
  if(!qs) { showPage('home'); return ''; }
  const like = `%${qs}%`;
  const {data:links} = await sb.from('links').select('*').or(`title.ilike.${like},summary.ilike.${like}`).order('updated_at',{ascending:false}).limit(20);
  const {data:reads} = await sb.from('reads').select('*').or(`title.ilike.${like},author.ilike.${like},summary.ilike.${like}`).order('updated_at',{ascending:false}).limit(20);
  let h = `<div class="page-header"><h1>🔍 搜索："${qs}"</h1></div>
    <p style="color:var(--tm);margin-bottom:20px">找到 <strong>${(links||[]).length}</strong> 条网址和 <strong>${(reads||[]).length}</strong> 条 PDF</p>`;
  if(!links?.length && !reads?.length) h += `<div class="empty-state"><div class="icon">🔍</div><p>没有找到相关内容</p></div>`;
  if(links?.length) {
    h += `<h2 style="font-size:1.1rem;margin-bottom:12px;border-bottom:2px solid var(--pl);padding-bottom:8px">🔗 网址 (${links.length})</h2>`;
    links.forEach(l => h += cardLink(l));
  }
  if(reads?.length) {
    h += `<h2 style="font-size:1.1rem;margin:24px 0 12px;border-bottom:2px solid var(--pl);padding-bottom:8px">📄 PDF (${reads.length})</h2>`;
    reads.forEach(r => h += cardRead(r));
  }
  return h;
}

// ── Card components ────────────────────────────────
function cardLink(l) {
  return `<div class="card">
    <div class="card-title"><a href="${esc(l.url)}" target="_blank">${esc(l.title)} ↗</a></div>
    <div class="card-meta">
      <span class="tag">${esc(l.category||'其他')}</span>
      ${l.thoughts?`<span>👤 ${esc(l.thoughts)}</span>`:''}
      <span>${fmtDate(l.created_at)}</span>
    </div>
    ${l.summary?`<div class="card-body">${esc(l.summary).substring(0,200)}</div>`:''}
    <div class="card-actions">
      <button class="btn btn-sm" onclick="editLink(${l.id})">✏️ 编辑</button>
      <button class="btn btn-sm btn-danger" onclick="delLink(${l.id})">🗑️ 删除</button>
    </div>
  </div>`;
}

function cardRead(r) {
  return `<div class="card">
    <div class="card-title">${esc(r.title)}</div>
    <div class="card-meta">
      <span class="tag">${esc(r.category||'其他')}</span>
      ${r.author?`<span>👤 ${esc(r.author)}</span>`:''}
      <span>${fmtDate(r.created_at)}</span>
    </div>
    ${r.summary?`<div class="card-body">${esc(r.summary).substring(0,200)}</div>`:''}
    ${r.pdf_key?`<div style="margin-top:8px"><a href="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${r.pdf_key}" class="pdf-link" target="_blank">📎 查看 PDF</a></div>`:''}
    ${r.thoughts?`<div class="feedback-badge" onclick="showFeedback(${r.id})" title="点击查看/编辑反馈">💬 已有反馈 — ${esc(r.thoughts).substring(0,80)}${r.thoughts.length>80?'...':''}</div>`:''}
    <div class="card-actions">
      <button class="btn btn-sm" onclick="editRead(${r.id})">✏️ 编辑</button>
      <button class="btn btn-sm btn-danger" onclick="delRead(${r.id})">🗑️ 删除</button>
      <button class="btn btn-sm" onclick="showFeedback(${r.id})" style="color:#d97706;border-color:#fde68a">💬 反馈</button>
    </div>
  </div>`;
}

// ── Link form ──────────────────────────────────────
let editingLinkId = null;
async function editLink(id) {
  editingLinkId = id||null;
  let l = null;
  if(id) { const {data} = await sb.from('links').select('*').eq('id',id).single(); l = data; }
  currentPage = 'linkForm';
  render();
  window._linkData = l;
}
async function renderLinkForm() {
  const l = window._linkData;
  let h = `<div class="page-header"><h1>${l?'✏️ 编辑网址':'➕ 添加新网址'}</h1>
    <button class="btn" onclick="showPage('links')">← 返回</button></div>
    <form class="card" style="max-width:720px;padding-right:24px" onsubmit="saveLink(event)">
    ${l?`<input type="hidden" name="id" value="${l.id}">`:''}
    <div class="form-group"><label>网址名称 <span style="color:var(--d)">*</span></label>
      <input class="form-control" name="title" required value="${esc2(l?.title||'')}" placeholder=""></div>
    <div class="form-group"><label>链接 <span style="color:var(--d)">*</span></label>
      <input class="form-control" name="url" type="url" required value="${esc2(l?.url||'')}" placeholder="https://..."></div>
    <div class="form-group"><label>分类</label><select class="form-control" name="category">${CATS.map(c => `<option ${l?.category===c?'selected':''} ${!l&&c==='其他'?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label>上传人</label>
      <input class="form-control" name="author" value="${esc2(l?.thoughts||'')}" placeholder="选填"></div>
    <div class="form-group"><label>📝 简介</label><textarea class="form-control" name="summary" rows="4" placeholder="简要描述...">${esc2(l?.summary||'')}</textarea></div>
    <button class="btn btn-primary">💾 保存</button></form>`;
  return h;
}
async function saveLink(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const obj = {
    title: fd.get('title'), url: fd.get('url'),
    category: fd.get('category')||'其他',
    thoughts: fd.get('author'),
    summary: fd.get('summary'),
    updated_at: new Date().toISOString()
  };
  if(fd.get('id')) {
    await sb.from('links').update(obj).eq('id', fd.get('id'));
    flash('网址已更新 ✓');
  } else {
    await sb.from('links').insert(obj);
    flash('网址已添加 ✓');
  }
  showPage('links');
}
async function delLink(id) {
  if(!confirm('确定删除？')) return;
  await sb.from('links').delete().eq('id',id);
  flash('已删除');
  render();
}

// ── Read form ──────────────────────────────────────
let editingReadId = null;
async function editRead(id) {
  editingReadId = id||null;
  let r = null;
  if(id) { const {data} = await sb.from('reads').select('*').eq('id',id).single(); r = data; }
  currentPage = 'readForm';
  render();
  window._readData = r;
}
async function renderReadForm() {
  const r = window._readData;
  let h = `<div class="page-header"><h1>${r?'✏️ 编辑 PDF':'➕ 添加新 PDF'}</h1>
    <button class="btn" onclick="showPage('reads')">← 返回</button></div>
    <form class="card" style="max-width:720px;padding-right:24px" onsubmit="saveRead(event)" enctype="multipart/form-data">
    ${r?`<input type="hidden" name="id" value="${r.id}">`:''}
    <div class="form-group"><label>标题 <span style="color:var(--d)">*</span></label>
      <input class="form-control" name="title" required value="${esc2(r?.title||'')}" placeholder=""></div>
    <div class="form-group"><label>分类</label><select class="form-control" name="category">${CATS.map(c => `<option ${r?.category===c?'selected':''} ${!r&&c==='其他'?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-group"><label>上传人</label>
      <input class="form-control" name="author" value="${esc2(r?.author||'')}" placeholder="选填"></div>
    <div class="form-group"><label>📎 上传 PDF <span class="hint">最大10MB</span></label>
      ${r?.pdf_key?`<p style="font-size:.85rem;margin-bottom:6px">当前：<a href="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${r.pdf_key}" target="_blank">${r.pdf_key}</a></p>`:''}
      <input type="file" class="form-control" name="pdf_file" accept=".pdf"></div>
    <div class="form-group"><label>📖 简介</label><textarea class="form-control" name="summary" rows="4">${esc2(r?.summary||'')}</textarea></div>
    <button class="btn btn-primary">💾 保存</button></form>`;
  return h;
}
async function saveRead(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const pdfFile = fd.get('pdf_file');
  let pdfKey = '';
  if(pdfFile && pdfFile.name) {
    const ext = pdfFile.name.split('.').pop();
    const key = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const {error} = await sb.storage.from(BUCKET).upload(key, pdfFile, {contentType:'application/pdf'});
    if(error) { flash('PDF上传失败: '+error.message, 'error'); return; }
    pdfKey = key;
  }
  const obj = {
    title: fd.get('title'), category: fd.get('category')||'其他',
    author: fd.get('author'),
    summary: fd.get('summary'),
    updated_at: new Date().toISOString()
  };
  if(pdfKey) obj.pdf_key = pdfKey;
  if(fd.get('id')) {
    await sb.from('reads').update(obj).eq('id', fd.get('id'));
    flash('PDF 已更新 ✓');
  } else {
    await sb.from('reads').insert(obj);
    flash('PDF 已添加 ✓');
  }
  showPage('reads');
}
async function delRead(id) {
  if(!confirm('确定删除？')) return;
  const {data} = await sb.from('reads').select('pdf_key').eq('id',id).single();
  if(data?.pdf_key) { await sb.storage.from(BUCKET).remove([data.pdf_key]); }
  await sb.from('reads').delete().eq('id',id);
  flash('已删除');
  render();
}

// ── Feedback modal ──────────────────────────────────
let feedbackReadId = null;
async function showFeedback(id) {
  feedbackReadId = id;
  const {data:r} = await sb.from('reads').select('thoughts').eq('id',id).single();
  const existing = r?.thoughts || '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'feedbackModal';
  overlay.innerHTML = `<div class="modal-box" onclick="event.stopPropagation()">
    <h3>💬 反馈 / 读后感</h3>
    <textarea class="form-control" id="feedbackText" rows="8" placeholder="输入读后感想、建议或反馈...">${esc2(existing)}</textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeFeedback()">取消</button>
      <button class="btn btn-primary" onclick="saveFeedback()">💾 保存反馈</button>
    </div>
  </div>`;
  overlay.addEventListener('click', closeFeedback);
  document.body.appendChild(overlay);
  document.getElementById('feedbackText').focus();
}
function closeFeedback() {
  feedbackReadId = null;
  const el = document.getElementById('feedbackModal');
  if(el) el.remove();
}
async function saveFeedback() {
  const text = document.getElementById('feedbackText').value;
  await sb.from('reads').update({thoughts: text, updated_at: new Date().toISOString()}).eq('id', feedbackReadId);
  closeFeedback();
  flash('反馈已保存 ✓');
  render();
}

// ── Utils ──────────────────────────────────────────
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function esc2(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { if(!d) return ''; return new Date(d).toISOString().slice(0,10); }

// ── Init ───────────────────────────────────────────
render();
</script>
</body>
</html>
